name: Build Magisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PicoClaw
        run: |
          rm -rf picoclaw 2>/dev/null || true
          git clone --depth 1 https://github.com/sipeed/picoclaw.git
          
      - name: Prepare workspace for embed
        run: |
          mkdir -p picoclaw/cmd/picoclaw/internal/onboard/workspace
          cp -r picoclaw/workspace/* picoclaw/cmd/picoclaw/internal/onboard/workspace/
          
      - name: Build picoclaw (Android ARM64)
        run: |
          cd picoclaw
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o picoclaw-android ./cmd/picoclaw
          
      - name: Build Web UI
        run: |
          cd picoclaw/web/frontend
          pnpm install
          pnpm run build
          
      - name: Build picoclaw-web (Android ARM64)
        run: |
          cd picoclaw/web
          # Copy built frontend
          cp -r frontend/dist backend/
          # Generate embed files
          cd backend
          go generate ./...
          # Build
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o picoclaw-web-android .
          
      - name: Create Magisk Module
        run: |
          mkdir -p picoclaw-magisk
          
          # Copy binaries (use Android version)
          cp picoclaw/picoclaw-android picoclaw-magisk/picoclaw
          cp picoclaw/web/backend/picoclaw-web-android picoclaw-magisk/picoclaw-web
          
          # Copy module files
          cp module.prop picoclaw-magisk/
          cp service.sh picoclaw-magisk/
          
      - name: Create ZIP
        run: |
          cd picoclaw-magisk
          zip -r ../picoclaw-magisk.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-magisk-${{ github.run_number }}
          path: picoclaw-magisk.zip
          retention-days: 5
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: picoclaw-magisk-${{ github.run_number }}
          path: .
          
      - name: Create Release
        run: |
          gh release delete ${{ github.ref_name }} --yes || true
          gh release create ${{ github.ref_name }} picoclaw-magisk.zip --title "PicoClaw Magisk ${{ github.ref_name }}" --notes "PicoClaw Magisk Module ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
