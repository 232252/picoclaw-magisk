name: Build Magisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.5)'
        required: false
        type: string

env:
  PICOCLAW_VERSION: nightly

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download official picoclaw binary
        run: |
          # Download official nightly build for ARM64
          wget -q "https://github.com/sipeed/picoclaw/releases/download/${PICOCLAW_VERSION}/picoclaw_Linux_arm64.tar.gz" -O picoclaw.tar.gz
          tar -xzf picoclaw.tar.gz
          ls -la picoclaw*
          
      - name: Set permissions
        run: |
          chmod +x picoclaw
          
      - name: Create module directory
        run: |
          mkdir -p picoclaw-module
          cp picoclaw picoclaw-module/
          cp module.prop picoclaw-module/
          cp service.sh picoclaw-module/
          cp post-fs-data.sh picoclaw-module/
          cp customize.sh picoclaw-module/
          cp action.sh picoclaw-module/
          cp tool.sh picoclaw-module/
          cp uninstall.sh picoclaw-module/
          cp config.json picoclaw-module/
          
      - name: Create ZIP
        run: |
          cd picoclaw-module
          zip -r ../picoclaw-magisk.zip .
          cd ..
          ls -la picoclaw-magisk.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-magisk
          path: picoclaw-magisk.zip
          retention-days: 5
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != ''
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: picoclaw-magisk
          path: .
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: picoclaw-magisk.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
